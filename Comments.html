<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments | EnttbotX</title>
    <style>
        :root {
            --primary: #ff6600;
            --primary-dark: #e65c00;
            --dark: #1a1a1a;
            --darker: #000;
            --light: #fff;
            --gray: #333;
            --transition: all 0.3s ease;
        }

        .button-container {
            text-align: center;
            margin-top: 2rem;
        }

        .styled-button {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--primary);
            color: var(--light);
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            font-size: 1rem;
            margin: 0.5rem;
            transition: background 0.3s ease, transform 0.3s ease;
            border: 2px solid transparent;
        }

        .styled-button:hover {
            background: var(--primary-dark);
            transform: translateY(-5px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--darker);
            color: var(--light);
        }

        .comment-box, .comment {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            background-color: var(--dark);
        }

        .comment-box input, .comment-box textarea, select {
            width: 100%;
            margin-bottom: 1rem;
            padding: 0.5rem;
            background-color: var(--gray);
            border: none;
            border-radius: 4px;
            color: var(--light);
        }

        .comment-actions {
            display: flex;
            gap: 10px;
        }

        button {
            background: var(--primary);
            border: none;
            border-radius: 4px;
            color: var(--light);
            padding: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            background: var(--primary-dark);
        }
    </style>
</head>
<body>
    <header>
        <h1>EnttbotX - Comments</h1>
    </header>

    <div class="button-container">
        <a href="https://enttbotx.github.io" class="styled-button">Home</a>
        <a href="https://enttbotx.github.io/Comments" class="styled-button">Comments</a>
        <a href="https://enttbotx.github.io/TermsOfUse" class="styled-button">Terms & Conditions</a>
        <a href="https://enttbotx.github.io/PrivacyPolicy" class="styled-button">Privacy Policy</a>
    </div>

    <div class="main-content">
        <div class="comment-box">
            <h3>Leave a Comment</h3>
            <input type="text" id="username" placeholder="Your Username" />
            <select id="plugin">
                <option value="" disabled selected>Select Plugin</option>
                <option value="ClansX">ClansX</option>
                <option value="FunkyFeather">FunkyFeather</option>
                <option value="GreetiX">GreetiX</option>
                <option value="XPad">XPad</option>
                <option value="ATG">Advanced Teleport GUI</option>
            </select>
            <textarea id="opinion" placeholder="Your Comment"></textarea>
            <button id="submit-comment">Submit</button>
        </div>

        <div class="comments-list" id="comments-list">
            <!-- Comentarios -->
        </div>
    </div>

    <script>
        const apiUrl = "https://github.com/EnttbotX/EnttbotX.github.io/blob/main/commentaries.txt";

        let comments = [];

        function loadComments() {
            const commentsList = document.getElementById("comments-list");
            commentsList.innerHTML = comments
                .map((comment, index) => `
                    <div class="comment">
                        <p><b>${comment.username}</b> on <i>${comment.plugin}</i></p>
                        <p>${comment.opinion}</p>
                        <div class="comment-actions">
                            <button onclick="editComment(${index})">Edit</button>
                            <button onclick="deleteComment(${index})">Delete</button>
                        </div>
                        <div id="reply-${index}" class="replies">
                            ${comment.replies.map(reply => `<div>${reply}</div>`).join("")}
                        </div>
                        <textarea placeholder="Reply..." id="reply-text-${index}"></textarea>
                        <button onclick="addReply(${index})">Reply</button>
                    </div>
                `)
                .join("");
        }

        function saveComments() {
            fetch(apiUrl, {
                method: "POST",
                body: JSON.stringify(comments),
                headers: { "Content-Type": "application/json" }
            }).catch(err => console.error("Error saving comments:", err));
        }

        function addComment() {
            const username = document.getElementById("username").value;
            const plugin = document.getElementById("plugin").value;
            const opinion = document.getElementById("opinion").value;

            if (username && plugin && opinion) {
                comments.push({ username, plugin, opinion, replies: [] });
                saveComments();
                loadComments();
            }
        }

        function deleteComment(index) {
            comments.splice(index, 1);
            saveComments();
            loadComments();
        }

        function editComment(index) {
            const newOpinion = prompt("Edit your comment:", comments[index].opinion);
            if (newOpinion) {
                comments[index].opinion = newOpinion;
                saveComments();
                loadComments();
            }
        }

        function addReply(index) {
            const replyText = document.getElementById(`reply-text-${index}`).value;
            if (replyText) {
                comments[index].replies.push(replyText);
                saveComments();
                loadComments();
            }
        }

        document.getElementById("submit-comment").addEventListener("click", addComment);

        loadComments();
    </script>
</body>
</html>
