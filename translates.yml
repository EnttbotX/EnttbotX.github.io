    portfolio.clansx: "ClansX is een krachtige en modulaire Minecraft-clanplugin. Het biedt complete systemen voor clancreatie, beheer en oorlogen, placeholder-integratie en ondersteuning voor meerdere economieën."
    portfolio.funkyfeather: "FunkyFeather laat spelers hun items en XP behouden na hun dood wanneer ze een FunkyFeather bij zich dragen. Compatibel met Minecraft 1.8–1.21."
    portfolio.xpad: "XPAD breidt XP-functionaliteit op servers uit met itemisatie, permanente opslag en overdrachten tussen spelers. Ideaal voor aangepaste economische systemen."
    portfolio.fastgive: "FastGive maakt het mogelijk om items en XP te geven via eenvoudige chatcommando's met configureerbare symbolen. Perfect voor beloningssystemen en kits."
    portfolio.instafriend: "InstaFriend laat spelers direct een getemde wolf verkrijgen met behulp van een wolf-spawnei. Lichtgewicht en compatibel met Minecraft 1.8–1.21."
    portfolio.intro: "Hoi, ik ben Enttbot, een Argentijnse plugin- en gamedeveloper, open voor opdrachten; je kunt me bereiken op Discord:"