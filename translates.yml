translates:
  es:
    nav.home: "Inicio"
    nav.portfolio: "Portafolio"
    nav.wiki: "Wiki"
    home.sub: "Desarrollador de plugins de Minecraft"
    portfolio.title: "Mis Proyectos"
    portfolio.source: "Código"
    portfolio.clansx: "ClansX es un plugin de clanes para Minecraft de alto rendimiento y modular. Ofrece sistemas completos para la creación, gestión y guerra entre clanes, integración de placeholders y soporte para múltiples economías."
    portfolio.funkyfeather: "FunkyFeather permite a los jugadores conservar sus objetos y XP después de morir si tienen una FunkyFeather. Compatible con Minecraft 1.8 a 1.21."
    portfolio.xpad: "XPAD extiende la funcionalidad de XP en los servidores, permitiendo la itemización, el almacenamiento persistente y la transferencia entre jugadores. Ideal para sistemas de economía personalizados."
    portfolio.fastgive: "FastGive permite otorgar objetos y XP mediante comandos simples usando símbolos configurables. Perfecto para sistemas de recompensas y kits."
    portfolio.instafriend: "InstaFriend permite a los jugadores obtener instantáneamente un lobo domesticado usando un huevo generador de lobos. Ligero y compatible con Minecraft 1.8–1.21."
    portfolio.intro: "Hola, soy Enttbot, soy un desarrollador de plugins y videojuegos argentino, estoy abierto a comisiones por si quieres ofrecerme; abajo te dejo mi server de Discord donde puedes contactarme: "

  en:
    nav.home: "Home"
    nav.portfolio: "Portfolio"
    nav.wiki: "Wiki"
    home.sub: "Minecraft Plugin Developer"
    portfolio.title: "My Projects"
    portfolio.source: "Source Code"
    portfolio.clansx: "ClansX is a high-performance, modular Minecraft clan plugin. It provides complete clan creation, management, and war systems, placeholder integration, and support for multiple economy plugins."
    portfolio.funkyfeather: "FunkyFeather allows players to keep their items and XP after death when carrying a FunkyFeather. Compatible with Minecraft 1.8–1.21."
    portfolio.xpad: "XPAD extends XP functionality on servers by enabling XP itemization, persistent storage, and player-to-player transfers. Ideal for custom economy systems."
    portfolio.fastgive: "FastGive allows you to grant items and XP through simple chat commands using configurable symbols. Perfect for reward systems and kits."
    portfolio.instafriend: "InstaFriend allows players to instantly obtain a tamed wolf using a wolf spawn egg. Lightweight and compatible with Minecraft 1.8–1.21."
    portfolio.intro: "Hi, I'm Enttbot — an Argentinian plugin and game developer open to commissions; you can contact me on Discord:"

  pt:
    nav.home: "Início"
    nav.portfolio: "Portfólio"
    nav.wiki: "Wiki"
    home.sub: "Desenvolvedor de plugins para Minecraft"
    portfolio.title: "Meus Projetos"
    portfolio.source: "Código-Fonte"
    portfolio.clansx: "ClansX é um plugin de clãs para Minecraft modular e de alto desempenho. Oferece sistemas completos de criação, gerenciamento e guerras entre clãs, integração com placeholders e suporte para múltiplas economias."
    portfolio.funkyfeather: "FunkyFeather permite que os jogadores mantenham seus itens e XP após morrerem se estiverem carregando uma FunkyFeather. Compatível com Minecraft 1.8–1.21."
    portfolio.xpad: "XPAD amplia as funcionalidades de XP nos servidores, permitindo itemização, armazenamento persistente e transferência entre jogadores. Ideal para sistemas de economia personalizados."
    portfolio.fastgive: "FastGive permite conceder itens e XP por meio de comandos simples no chat usando símbolos configuráveis. Perfeito para sistemas de recompensas e kits."
    portfolio.instafriend: "InstaFriend permite que os jogadores obtenham instantaneamente um lobo domesticado usando um ovo gerador de lobos. Leve e compatível com Minecraft 1.8–1.21."
    portfolio.intro: "Olá, sou o Enttbot, desenvolvedor argentino de plugins e jogos, estou aberto a comissões; você pode me contatar no Discord:"

  fr:
    nav.home: "Accueil"
    nav.portfolio: "Portfolio"
    nav.wiki: "Wiki"
    home.sub: "Développeur de plugins Minecraft"
    portfolio.title: "Mes Projets"
    portfolio.source: "Code Source"
    portfolio.clansx: "ClansX est un plugin de clans Minecraft modulaire et performant. Il propose des systèmes complets de création, gestion et guerre de clans, l'intégration des placeholders et la prise en charge de plusieurs économies."
    portfolio.funkyfeather: "FunkyFeather permet aux joueurs de conserver leurs objets et leur XP après leur mort s'ils possèdent une FunkyFeather. Compatible avec Minecraft 1.8–1.21."
    portfolio.xpad: "XPAD étend les fonctionnalités de l'XP sur les serveurs grâce à l'itemisation, au stockage persistant et aux transferts entre joueurs. Idéal pour les systèmes économiques personnalisés."
    portfolio.fastgive: "FastGive permet d'accorder des objets et de l'XP via de simples commandes de chat utilisant des symboles configurables. Parfait pour les systèmes de récompenses et les kits."
    portfolio.instafriend: "InstaFriend permet aux joueurs d'obtenir instantanément un loup apprivoisé à l'aide d'un œuf d'apparition de loup. Léger et compatible avec Minecraft 1.8–1.21."
    portfolio.intro: "Bonjour, je suis Enttbot, développeur argentin de plugins et de jeux, ouvert aux commandes — contactez-moi sur Discord :"

  de:
    nav.home: "Startseite"
    nav.portfolio: "Portfolio"
    nav.wiki: "Wiki"
    home.sub: "Minecraft-Plugin-Entwickler"
    portfolio.title: "Meine Projekte"
    portfolio.source: "Quellcode"
    portfolio.clansx: "ClansX ist ein leistungsstarkes und modulares Minecraft-Clan-Plugin. Es bietet vollständige Systeme für Clan-Erstellung, Verwaltung und Kriege, Placeholder-Integration sowie Unterstützung für mehrere Wirtschaftssysteme."
    portfolio.funkyfeather: "FunkyFeather ermöglicht Spielern, ihre Gegenstände und XP nach dem Tod zu behalten, wenn sie eine FunkyFeather besitzen. Kompatibel mit Minecraft 1.8–1.21."
    portfolio.xpad: "XPAD erweitert die XP-Funktionalität auf Servern durch Itemisierung, dauerhafte Speicherung und Übertragungen zwischen Spielern. Ideal für benutzerdefinierte Wirtschaftssysteme."
    portfolio.fastgive: "FastGive ermöglicht das Vergeben von Gegenständen und XP über einfache Chatbefehle mit konfigurierbaren Symbolen. Perfekt für Belohnungssysteme und Kits."
    portfolio.instafriend: "InstaFriend ermöglicht es Spielern, sofort einen gezähmten Wolf mit einem Wolf-Spawn-Ei zu erhalten. Leichtgewichtig und kompatibel mit Minecraft 1.8–1.21."
    portfolio.intro: "Hallo, ich bin Enttbot, ein argentinischer Plugin- und Spieleentwickler, offen für Aufträge; kontaktiere mich auf Discord:"

  it:
    nav.home: "Home"
    nav.portfolio: "Portfolio"
    nav.wiki: "Wiki"
    home.sub: "Sviluppatore di plugin Minecraft"
    portfolio.title: "I Miei Progetti"
    portfolio.source: "Codice Sorgente"
    portfolio.clansx: "ClansX è un plugin per clan di Minecraft modulare e ad alte prestazioni. Offre sistemi completi per la creazione, gestione e guerra tra clan, integrazione con placeholder e supporto per più economie."
    portfolio.funkyfeather: "FunkyFeather consente ai giocatori di conservare oggetti ed XP dopo la morte se possiedono una FunkyFeather. Compatibile con Minecraft 1.8–1.21."
    portfolio.xpad: "XPAD estende le funzionalità XP sui server consentendo itemizzazione, archiviazione persistente e trasferimenti tra giocatori. Ideale per sistemi economici personalizzati."
    portfolio.fastgive: "FastGive consente di assegnare oggetti ed XP tramite semplici comandi in chat con simboli configurabili. Perfetto per sistemi di ricompense e kit."
    portfolio.instafriend: "InstaFriend permette ai giocatori di ottenere immediatamente un lupo addomesticato utilizzando un uovo generatore di lupi. Leggero e compatibile con Minecraft 1.8–1.21."
    portfolio.intro: "Ciao, sono Enttbot, sviluppatore argentino di plugin e videogiochi, aperto a commissioni; contattami su Discord:"

  nl:
