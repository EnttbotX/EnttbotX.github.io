wiki_title_suffix: " - Wiki"

pages:
  EnttAPI:
    title: "EnttAPI"
    subtitle: "Developer API"
    description: "EnttAPI is an API designed to simplify and accelerate your plugin development."
    icon: "https://www.spigotmc.org/data/resource_icons/127/127845.jpg?1754810224"
    
    modules:
      - id: "inventory_api"
        title: "Inventory API Module"
        short_desc: "Fluent builder pattern for custom interactive GUIs."
        content: |
          This module provides a robust, easy-to-use API for creating custom Bukkit inventories. It eliminates the need to write manual event handlers for clicks, drags, and inventory closing. By utilizing a fluent builder pattern, you can design menus, set permissions, and attach actions directly to items in just a few lines of code.
          
          **Important:** Ensure that the `Events` class is registered as a listener in your main plugin class for interactions to work automatically.
        subsections:
          - title: "1. Creating Interactive Items"
            content: |
              Use the `Item` class to build `ItemStack` objects with custom names, lore, amounts, and click handlers. Colors are automatically translated.
              
              ```java
              Item myItem = Item.of(Material.DIAMOND)
                  .name("&bEpic Diamond")
                  .lore(Arrays.asList("&7Click to receive a reward!"))
                  .onClick(e -> {
                      Player p = (Player) e.getWhoClicked();
                      p.sendMessage("You clicked the diamond!");
                  });
              ```
          - title: "2. Building the GUI"
            content: |
              Use the `Builder` class to assemble your inventory. You can define the size, title, and easily fill empty spaces or create borders. You can also place items using absolute slots or row/column coordinates.
              
              ```java
              GUI myMenu = Builder.create(27, "&8Server Menu")
                  .needPerm("enttapi.gui.admin")
                  .setNoPermsMessage("&cYou lack the permissions to open this!")
                  .border(Item.of(Material.BLACK_STAINED_GLASS_PANE).name(" "))
                  .item(2, 5, myItem) // Row 2, Column 5
                  .onClose(e -> System.out.println("Menu closed!"))
                  .build();
              ```
          - title: "3. Opening the Menu"
            content: |
              Once your GUI is built, simply call the `open()` method and pass the player instance. The API handles permission checks and automatically cancels default interactions (like stealing items).
              
              ```java
              myMenu.open(player);
              ```

      - id: "mysql_document_api"
        title: "MySQL Module (Document API)"
        short_desc: "Fast JSON-based NoSQL storage over MySQL."
        content: |
          This module provides an advanced and easy-to-use system for managing MySQL databases as if they were document-oriented (MongoDB style). It utilizes the GSON library to serialize and store information in JSON format. This eliminates the need to write complex SQL statements or manually create columns for every variable. Tables are generated automatically with an identifier (`id`) and a long text field (`data`).
        subsections:
          - title: "1. Connection and Disconnection"
            content: |
              To use the system, you must first instantiate the main class and initialize the JDBC connection by providing your credentials.
              
              ```java
              MySQL db = new MySQL();
              boolean connected = db.connect("localhost", "3306", "my_server", "root", "password123");
              
              if (connected) {
                  System.out.println("Database connected!");
              }
              
              // To safely close the connection when disabling the plugin:
              // db.disconnect();
              ```
          - title: "2. Document Creation and Editing"
            content: |
              The `Document` object manages a local in-memory cache. You can chain the `set()` method to add or update multiple variables, and finally call `save()` to push the data to MySQL via a safe database query (`INSERT ... ON DUPLICATE KEY UPDATE`).
              
              ```java
              // Connects to the "players" table using the UUID as a unique ID
              MySQL.Document playerDoc = db.document("players", player.getUniqueId().toString());
              
              // Saves various information using the Builder pattern
              playerDoc.set("username", player.getName())
                       .set("level", 15)
                       .set("balance", 2500.50)
                       .set("is_admin", false)
                       .save(); // It is crucial to call save() to persist the cache!
              ```
          - title: "3. Data Retrieval"
            content: |
              When requesting a `Document`, it automatically reads the information from the database and stores it in the local cache. You can retrieve values using specific getter methods (`getString`, `getInt`, `getDouble`, etc.) which include automatic conversion handling and protection against number format errors.
              
              ```java
              MySQL.Document playerDoc = db.document("players", player.getUniqueId().toString());
              
              String name = playerDoc.getString("username");
              int level = playerDoc.getInt("level"); // Returns 0 if it doesn't exist
              boolean isAdmin = playerDoc.getBoolean("is_admin"); // Returns false if it doesn't exist
              ```
          - title: "4. Verification and Record Deletion"
            content: |
              The API includes utility methods to confirm the existence of a record in the database or to completely destroy it (clearing both the in-memory cache and the row in MySQL).
              
              ```java
              if (playerDoc.exists()) {
                  // Permanently deletes the player's data from the table
                  playerDoc.delete();
              }
              ```
