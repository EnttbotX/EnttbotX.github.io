wiki_title_suffix: " - Wiki"

pages:
  EnttAPI:
    title: "EnttAPI"
    subtitle: "Developer API"
    description: "EnttAPI es una API diseñada para simplificar y acelerar el desarrollo de tus plugins."
    icon: "https://www.spigotmc.org/data/resource_icons/127/127845.jpg?1754810224"
    
    modules:
      - id: "mysql"
        title: "Módulo MySQL"
        short_desc: "Conexión automática de bases de datos."
        content: "Este módulo elimina por completo la necesidad de escribir código SQL manual y configurar hilos asíncronos."
        subsections:
          - title: "Configuración Inicial"
            content: "Define los datos de tu servidor en el archivo config.yml generado en tu carpeta de plugins."
            buttons:
              - text: "Ver Config Base"
                url: "https://github.com/enttbotx"
                class: "btn-primary"
          - title: "Métodos Principales"
            content: "Utiliza `EnttAPI.getMySQL().executeAsync()` para ejecutar tus consultas sin congelar el servidor."

      - id: "clansex"
        title: "Módulo Clansex"
        short_desc: "Gestión avanzada de clanes y equipos."
        content: "Administra invitaciones, jerarquías y almacenamiento de datos para sistemas competitivos."
        subsections:
          - title: "Creación de Clanes"
            content: "Los jugadores pueden usar la API interna para registrar etiquetas personalizadas en el chat."
            buttons:
              - text: "JavaDocs Clansex"
                url: "https://example.com"
                class: "btn-ghost"
