<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title id="site-title">Wiki — EnttbotX</title>
  <link id="site-favicon" rel="icon" href="https://www.spigotmc.org/data/avatars/s/1937/1937569.jpg?1725636356" type="image/jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  
  <style>
    .gitbook-container {
      display: flex;
      margin-top: var(--header-h, 70px);
      min-height: calc(100vh - var(--header-h, 70px));
    }

    .wiki-sidebar {
      width: 280px;
      background: #111116;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1.5rem;
      position: fixed;
      top: var(--header-h, 70px);
      bottom: 0;
      left: 0;
      overflow-y: auto;
    }

    .search-box {
      width: 100%;
      padding: 0.5rem 0.8rem;
      margin-bottom: 1rem;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: #16161c;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }

    .sidebar-menu { list-style: none; padding: 0; margin: 0; }
    .sidebar-title { color: var(--text-muted, #888); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem; font-weight: 700; }
    
    .sidebar-item { margin-bottom: 0.3rem; }
    .sidebar-link {
      display: block; padding: 0.4rem 0.7rem; color: #ccc; text-decoration: none; border-radius: 4px; font-size: 0.95rem; cursor: pointer; transition: 0.2s;
    }
    .sidebar-link:hover, .sidebar-link.active {
      background: rgba(0, 123, 255, 0.15); color: #007bff; font-weight: 500;
    }

    .wiki-content {
      margin-left: 280px;
      flex: 1;
      padding: 3rem;
      max-width: 900px;
    }

    .sub-block {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-left: 4px solid #007bff;
      padding: 1.5rem;
      border-radius: 0 8px 8px 0;
      margin-top: 1.5rem;
    }
    .sub-block h4 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; color: #fff; margin-bottom: 0.5rem; }
    .sub-block .text-content { color: #b3b3b3; line-height: 1.6; font-size: 0.95rem; }

    .code-container {
      background: #1e1e24;
      border-radius: 8px;
      margin: 1rem 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #282a36;
      padding: 0.4rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .code-lang {
      color: #a2a2ca;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .copy-btn {
      background: transparent;
      border: 1px solid #555;
      color: #ccc;
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .copy-btn:hover {
      background: #444;
      color: #fff;
    }
    .code-container pre {
      margin: 0;
      padding: 1rem;
      overflow-x: auto;
    }
    .code-container code {
      font-family: monospace;
      color: #f8f8f2;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .btn-container { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.85rem; border-radius: 4px; text-decoration: none; display: inline-block; }
  </style>
</head>
<body>
  <header>
    <nav class="header-nav">
      <ul>
        <li><a href="index.html#home" class="nav-link">Inicio</a></li>
        <li><a href="index.html#portfolio" class="nav-link">Portafolio</a></li>
      </ul>
    </nav>
    <a href="https://ko-fi.com/enttbot" target="_blank" class="kofi-link">
      <img src="https://cdn.prod.website-files.com/5c14e387dab576fe667689cf/670f5a01c01ea9191809398c_support_me_on_kofi_blue.png" alt="Support">
    </a>
  </header>

  <div class="gitbook-container">
    <aside class="wiki-sidebar">
      <select id="lang-select" class="search-box" onchange="changeLang()">
        <option value="en">English</option>
        <option value="es">Español</option>
      </select>
      <input type="text" id="wiki-search" class="search-box" placeholder="Search module..." oninput="searchModules()">
      <div class="sidebar-title" id="lbl-modules">Modules</div>
      <ul id="sidebar-menu" class="sidebar-menu"></ul>
    </aside>

    <main class="wiki-content">
      <div class="hero" style="text-align: left; max-width: 100%; padding: 0;">
        <h1 class="hero-title" id="wiki-title" style="font-size: 2.5rem;">Loading...</h1>
        <p class="hero-sub" id="wiki-subtitle" style="margin-top:0.3rem; color:var(--text-muted); letter-spacing:0.12em; text-transform:uppercase; font-size:0.9rem;"></p>
        
        <p id="wiki-description" style="color:var(--text-muted); margin-top: 1rem; line-height: 1.6;">
          Please wait...
        </p>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 2rem 0;">

        <div id="active-module-content"></div>
      </div>
    </main>
  </div>

  <script>
    let currentModules = [];
    let currentLang = 'en';

    function t(key, mod) {
      if(mod && mod.translates && mod.translates[key] && mod.translates[key][currentLang]) {
        return mod.translates[key][currentLang];
      }
      return key;
    }

    function changeLang() {
      currentLang = document.getElementById('lang-select').value;
      
      document.getElementById('lbl-modules').innerText = currentLang === 'en' ? 'Modules' : 'Módulos';
      document.getElementById('wiki-search').placeholder = currentLang === 'en' ? 'Search module...' : 'Buscar módulo...';
      document.getElementById('wiki-description').innerText = currentLang === 'en' 
        ? "EnttAPI is an API designed to simplify and accelerate your plugin development." 
        : "EnttAPI es una API diseñada para simplificar y acelerar el desarrollo de tus plugins.";

      renderSidebar();
      const activeLink = document.querySelector('.sidebar-link.active');
      if(activeLink) {
        displayModuleContent(activeLink.id.replace('tab-', ''));
      }
    }

    function formatTextWithCode(text) {
      if (!text) return "";
      const paragraphs = text.replace(/```(\w+)?\n([\s\S]*?)```/g, function(match, lang, code) {
        const escapedCode = code.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const language = lang ? lang : 'code';
        const copyBtnText = currentLang === 'en' ? 'Copy' : 'Copiar';
        return `<div class="code-container"><div class="code-header"><span class="code-lang">${language}</span><button class="copy-btn" onclick="copyToClipboard(this)">${copyBtnText}</button></div><pre><code>${escapedCode}</code></pre></div>`;
      });
      return paragraphs.replace(/\n(?![^<]*>)/g, '<br>');
    }

    function copyToClipboard(button) {
      const codeContainer = button.parentElement.nextElementSibling;
      const codeText = codeContainer.innerText;

      navigator.clipboard.writeText(codeText).then(() => {
        const originalText = button.innerText;
        button.innerText = currentLang === 'en' ? "Copied!" : "¡Copiado!";
        button.style.borderColor = "#4ade80";
        button.style.color = "#4ade80";
        
        setTimeout(() => {
          button.innerText = originalText;
          button.style.borderColor = "";
          button.style.color = "";
        }, 2000);
      });
    }

    async function loadYamlConfig() {
      try {
        const [invRes, mysqlRes] = await Promise.all([
          fetch('Wikies/inventory.yml'),
          fetch('Wikies/mysql.yml')
        ]);
        
        const invText = await invRes.text();
        const mysqlText = await mysqlRes.text();
        
        currentModules = [
          jsyaml.load(invText),
          jsyaml.load(mysqlText)
        ];

        document.getElementById('wiki-title').innerText = "EnttAPI";
        document.getElementById('wiki-subtitle').innerText = "Developer API";
        document.getElementById('wiki-description').innerText = "EnttAPI is an API designed to simplify and accelerate your plugin development.";
        
        renderSidebar();
        if(currentModules.length > 0) {
          displayModuleContent(currentModules[0].id);
        }
      } catch (error) {
        document.getElementById('wiki-title').innerText = "Error 404";
        document.getElementById('wiki-description').innerText = "Could not load YAML files.";
      }
    }

    function renderSidebar() {
      const sidebarMenu = document.getElementById('sidebar-menu');
      sidebarMenu.innerHTML = '';
      
      currentModules.forEach((mod, index) => {
        const li = document.createElement('li');
        li.className = 'sidebar-item';
        
        const isActive = document.querySelector('.sidebar-link.active') 
            ? document.querySelector('.sidebar-link.active').id === `tab-${mod.id}`
            : index === 0;

        li.innerHTML = `<a class="sidebar-link ${isActive ? 'active' : ''}" id="tab-${mod.id}" onclick="displayModuleContent('${mod.id}')">${t(mod.title, mod)}</a>`;
        sidebarMenu.appendChild(li);
      });
      searchModules();
    }

    function displayModuleContent(moduleId) {
      document.querySelectorAll('.sidebar-link').forEach(link => link.classList.remove('active'));
      const activeLink = document.getElementById(`tab-${moduleId}`);
      if(activeLink) activeLink.classList.add('active');

      const mod = currentModules.find(m => m.id === moduleId);
      const container = document.getElementById('active-module-content');
      container.innerHTML = '';

      if (mod) {
        let modHTML = `
          <h2 style="color: #fff; font-size: 1.8rem; margin-bottom: 0.3rem;">${t(mod.title, mod)}</h2>
          <em style="color: var(--text-muted); display:block; margin-bottom: 1.5rem;">${t(mod.short_desc, mod)}</em>
          <div style="color: #e0e0e0; line-height: 1.6; font-size: 1.05rem;">${formatTextWithCode(t(mod.content, mod))}</div>
          <div class="subsections-area" id="subsections-area"></div>
        `;
        container.innerHTML = modHTML;

        if (mod.subsections) {
          const subArea = document.getElementById('subsections-area');
          mod.subsections.forEach((sub, idx) => {
            const subId = `sub-btn-container-${idx}`;
            const subBlock = document.createElement('div');
            subBlock.className = 'sub-block';
            subBlock.innerHTML = `
              <h4>${t(sub.title, mod)}</h4>
              <div class="text-content">${formatTextWithCode(t(sub.content, mod))}</div>
              <div class="btn-container" id="${subId}"></div>
            `;
            subArea.appendChild(subBlock);

            if (sub.buttons) {
              const btnContainer = document.getElementById(subId);
              sub.buttons.forEach(btn => {
                const a = document.createElement('a');
                a.href = btn.url;
                a.className = `btn btn-sm ${btn.class}`;
                a.innerText = btn.text;
                if(btn.url.startsWith('http')) a.target = "_blank";
                btnContainer.appendChild(a);
              });
            }
          });
        }
      }
    }

    function searchModules() {
      const query = document.getElementById('wiki-search').value.toLowerCase();
      
      currentModules.forEach(mod => {
        let matchInSubs = false;
        if(mod.subsections) {
          matchInSubs = mod.subsections.some(s => 
            t(s.title, mod).toLowerCase().includes(query) || 
            t(s.content, mod).toLowerCase().includes(query)
          );
        }

        const matches = t(mod.title, mod).toLowerCase().includes(query) || 
                        t(mod.short_desc, mod).toLowerCase().includes(query) || 
                        matchInSubs;
        
        const sidebarLink = document.getElementById(`tab-${mod.id}`);
        if(sidebarLink) {
          sidebarLink.style.display = matches ? 'block' : 'none';
        }
      });
    }

    document.addEventListener('DOMContentLoaded', loadYamlConfig);
  </script>
</body>
</html>
