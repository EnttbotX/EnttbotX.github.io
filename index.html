<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ad Reward Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0;
      background: #1a1a1a;
      color: white;
    }

    .hidden {
      display: none;
    }

    .container {
      padding: 20px;
    }

    .game-box {
      margin: 20px auto;
      padding: 20px;
      border: 2px solid #007aff;
      border-radius: 10px;
      width: 80%;
      max-width: 400px;
      background: #333;
    }

    .button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 5px;
      background: #007aff;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    .button:hover {
      background: #0056b3;
    }

    .ad-block-warning {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ad Reward Game</h1>
    <div id="ad-block-detection" class="ad-block-warning hidden">
      <p>We detected an ad blocker. Please disable it to play and earn rewards.</p>
    </div>
    <div id="game-container" class="hidden">
      <p>Earn gold by playing the game and watching ads!</p>
      <div class="game-box">
        <p>Gold: <span id="gold-count">0</span></p>
        <button class="button" id="play-button">Play</button>
        <button class="button" id="watch-ad-button">Watch Ad</button>
        <button class="button" id="withdraw-button">Withdraw</button>
      </div>
      <p id="message"></p>
    </div>
  </div>

  <!-- Fake Ad Banner -->
  <div id="fake-ad-banner" style="display: none;">
    <script>
      // Fake ad content to detect ad blockers
    </script>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const adBlockDetection = document.getElementById("ad-block-detection");
      const gameContainer = document.getElementById("game-container");
      const goldCount = document.getElementById("gold-count");
      const playButton = document.getElementById("play-button");
      const watchAdButton = document.getElementById("watch-ad-button");
      const withdrawButton = document.getElementById("withdraw-button");
      const message = document.getElementById("message");

      let gold = 0;
      const minimumWithdrawal = 100;

      // Ad blocker detection
      const adBlockTest = document.getElementById("fake-ad-banner");
      if (adBlockTest.offsetHeight === 0 || adBlockTest.style.display === "none") {
        adBlockDetection.classList.remove("hidden");
      } else {
        gameContainer.classList.remove("hidden");
      }

      // Play button logic
      playButton.addEventListener("click", () => {
        gold += 10;
        goldCount.textContent = gold;
        message.textContent = "You earned 10 gold!";
      });

      // Watch ad button logic
      watchAdButton.addEventListener("click", () => {
        gold += 20;
        goldCount.textContent = gold;
        message.textContent = "You earned 20 gold for watching an ad!";
      });

      // Withdraw button logic
      withdrawButton.addEventListener("click", () => {
        if (gold >= minimumWithdrawal) {
          gold -= minimumWithdrawal;
          goldCount.textContent = gold;
          message.textContent = "You have successfully withdrawn $1 to your PayPal!";
          // In a real implementation, integrate PayPal payouts here.
        } else {
          message.textContent = `You need at least ${minimumWithdrawal} gold to withdraw.`;
        }
      });
    });
  </script>
</body>
</html>
