<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Support me by donating and checking out the announcements!">
    <title>Support My Work</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }
        main {
            padding: 20px;
            max-width: 800px;
            margin: auto;
            background: white;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .announcement {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            background: #f1f1f1;
        }
        .donation {
            text-align: center;
            margin-top: 20px;
        }
        .donation button {
            background-color: #0070ba;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .donation button:hover {
            background-color: #005c99;
        }
        .ads {
            margin: 20px 0;
            text-align: center;
        }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6491239794138075" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <h1>Support My Work</h1>
        <p>Check out the announcements below and consider donating!</p>
    </header>
    <main>
        <section class="ads">
            <ins class="adsbygoogle"
                style="display:block"
                data-ad-client="ca-pub-6491239794138075"
                data-ad-slot="XXXXXXXXXX"
                data-ad-format="auto"
                data-full-width-responsive="true"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </section>

        <section class="donation">
            <h2>Support Me</h2>
            <p>Donate me for future proyects. I need monmey :(</p>
            <form action="https://ko-fi.com/enttbot" method="post" target="_blank">
                <input type="hidden" name="hosted_button_id" value="YOUR_BUTTON_ID">
                <button type="submit"
                            <img src="https://storage.ko-fi.com/cdn/logomarkLogo.png" height="16" class="kfds-right-mrgn-8 cup-in-button">
                            <span id="">Donate</span>
                        </button>
            </form>
        </section>
    </main>
</body>
</html>
